steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ballotbuddy:$COMMIT_SHA', '.']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ballotbuddy:$COMMIT_SHA']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ballotbuddy-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ballotbuddy:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      # NOTE: In a real environment, you should use Google Cloud Secret Manager for API keys
      # e.g., --set-secrets=GOOGLE_CIVIC_API_KEY=google-civic-key:latest,GEMINI_API_KEY=gemini-key:latest

images:
  - 'gcr.io/$PROJECT_ID/ballotbuddy:$COMMIT_SHA'
